<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Journey Dashboard · Weem</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="styles.css">
<script defer src="app.js"></script>
</head>
<body>
<div class="dash">
    <div id="data-status" class="data-status" style="display:none;"></div>
    <!-- MANAGEMENT PANEL -->
    <div class="mgmt">
        <div class="mgmt-title">Customer Journey Dashboard <span>WEEM Analytics</span></div>
        <div class="kpis">
            <div class="kpi"><div class="kpi-label">Journey Paths</div><div class="kpi-val" id="kpi-journeys">-</div></div>
            <div class="kpi"><div class="kpi-label">Customers</div><div class="kpi-val" id="kpi-customers">-</div></div>
            <div class="kpi"><div class="kpi-label">Orders</div><div class="kpi-val" id="kpi-orders">-</div></div>
            <div class="kpi"><div class="kpi-label">Conversions</div><div class="kpi-val" id="kpi-conversions">-</div></div>
            <div class="kpi"><div class="kpi-label">Clicks</div><div class="kpi-val" id="kpi-clicks">-</div></div>
        </div>
        <div class="filters">
            <div class="f-group"><label>From</label><input type="date" id="f-from" onchange="D.filter()"></div>
            <div class="f-group"><label>To</label><input type="date" id="f-to" onchange="D.filter()"></div>
            <div class="f-group"><label>Search</label><input type="text" id="f-search" placeholder="Name, email, fingerprint, order ID..." oninput="D.filter()"></div>
            <div class="f-group"><label>First Source</label><div class="multi-select" id="ms-first-source"><div class="ms-trigger" onclick="D.toggleMultiSelect('ms-first-source')">All Sources ▾</div><div class="ms-dropdown" style="display:none;position:absolute;z-index:50;"></div></div></div>
            <div class="f-group"><label>Subsequent Source</label><div class="multi-select" id="ms-subsequent-source"><div class="ms-trigger" onclick="D.toggleMultiSelect('ms-subsequent-source')">All Sources ▾</div><div class="ms-dropdown" style="display:none;position:absolute;z-index:50;"></div></div></div>
            <div class="f-group"><label>Campaign</label><select id="f-campaign" onchange="D.filter()"><option value="">All Campaigns</option></select></div>
            <div class="f-group"><label>Country</label><select id="f-country" onchange="D.filter()"><option value="">All Countries</option></select></div>
            <button class="btn-clear" onclick="D.clearFilters()">Clear Filters</button>
            <button class="btn-funnel-toggle" id="funnel-toggle-btn" onclick="D.toggleFunnelPanel()">Show Conversion Funnel</button>
        </div>
    </div>

    <!-- CONVERSION FUNNEL -->
    <div class="funnel-panel" id="funnel-panel" style="display:none">
        <div class="funnel-header">
            <span class="funnel-title">Conversion Funnel</span>
            <span class="funnel-summary" id="funnel-summary"></span>
        </div>
        <div class="funnel-body" id="funnel-body">
            <div class="funnel-bar" id="funnel-bar"></div>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" onclick="D.switchTab('route')">Journey Paths<span class="tab-count" id="tc-route"></span></div>
        <div class="tab" onclick="D.switchTab('orders')">Orders<span class="tab-count" id="tc-orders"></span></div>
        <div class="tab" onclick="D.switchTab('customers')">Customers<span class="tab-count" id="tc-customers"></span></div>
        <div class="tab" onclick="D.switchTab('attribution')">Attribution<span class="tab-count" id="tc-attribution"></span></div>
    </div>

    <!-- JOURNEY PATHS TAB -->
    <div class="tab-body active" id="tab-route">
        <div class="card">
            <div class="card-hdr"><h3>Journey Paths</h3></div>
            <div id="route-table" style="overflow-x:auto;"></div>
            <div class="pager" id="route-pager"></div>
        </div>
    </div>

    <!-- ORDERS TAB -->
    <div class="tab-body" id="tab-orders">
        <div class="card">
            <div class="card-hdr"><h3>Orders</h3></div>
            <div id="orders-table"></div>
            <div class="pager" id="orders-pager"></div>
        </div>
    </div>


    <!-- CUSTOMERS TAB -->
    <div class="tab-body" id="tab-customers">
        <div class="card">
            <div class="card-hdr"><h3>Customers</h3></div>
            <div id="customers-table"></div>
            <div class="pager" id="customers-pager"></div>
        </div>
    </div>

    <!-- ATTRIBUTION TAB -->
    <div class="tab-body" id="tab-attribution">
        <div class="card" style="padding:20px;">
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap">
                <h3 style="margin:0;font-size:16px;font-weight:700">Attribution Analysis</h3>
                <div class="attr-view-toggle">
                    <button class="btn-attr active" id="btn-attr-source" onclick="D.setAttrView('source')">By Source</button>
                    <button class="btn-attr" id="btn-attr-campaign" onclick="D.setAttrView('campaign')">By Campaign</button>
                </div>
                <span style="font-size:12px;color:var(--text-dim);margin-left:auto" id="attr-summary"></span>
            </div>
            <div style="overflow-x:auto;" id="attr-table-wrap">
                <table class="tbl" id="attr-table">
                    <thead id="attr-thead"></thead>
                    <tbody id="attr-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="overlay">
    <div class="overlay-bg" onclick="D.closeDetail()"></div>
    <div class="detail-panel">
        <button class="detail-close" onclick="D.closeDetail()">&times;</button>
        <div id="detail-content"></div>
    </div>
</div>

</body>
</html>
